# SonarCloud Configuration
sonar.projectKey=fqabdullah_devops-leaderboard
sonar.organization=fqabdullah

# Project Information
sonar.projectName=DevOps Leaderboard Application
sonar.projectVersion=1.0

# Source Code Paths
sonar.sources=backend/src,frontend/src
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Language
sonar.language=ts
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/*.test.ts,**/*.spec.ts

# Coverage Exclusions
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/test/**
