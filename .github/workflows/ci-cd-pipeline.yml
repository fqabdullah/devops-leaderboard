name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/devops-frontend

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm install
    
    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install
    
    - name: Build Backend
      working-directory: ./backend
      run: npm run build
    
    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build
      env:
        CI: false
    
    - name: Run Backend Tests
      working-directory: ./backend
      run: npm test -- --passWithNoTests || echo "No tests found"
    
    - name: Run Frontend Tests
      working-directory: ./frontend
      run: npm test -- --passWithNoTests --watchAll=false || echo "No tests found"

  sonarqube:
    name: SonarQube Code Quality Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Run Trivy Scan on Backend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './backend'
        format: 'table'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'
    
    - name: Run Trivy Scan on Frontend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './frontend'
        format: 'table'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

  docker-build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [sonarqube, trivy-scan]
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Get Short SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Build and Push Backend Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.BACKEND_IMAGE }}:latest
          ${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}
        cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:latest
        cache-to: type=inline
    
    - name: Build and Push Frontend Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ env.FRONTEND_IMAGE }}:latest
          ${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.sha_short }}
        cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:latest
        cache-to: type=inline
    
    - name: Scan Backend Docker Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.BACKEND_IMAGE }}:latest
        format: 'table'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'
    
    - name: Scan Frontend Docker Image with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.FRONTEND_IMAGE }}:latest
        format: 'table'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
    
    - name: Configure kubectl
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
    
    - name: Verify Cluster Access
      run: |
        kubectl cluster-info
        kubectl get nodes
    
    - name: Get Short SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Update Backend Deployment
      run: |
        kubectl set image deployment/backend backend=${{ env.BACKEND_IMAGE }}:${{ steps.vars.outputs.sha_short }} -n leaderboard
        kubectl rollout status deployment/backend -n leaderboard --timeout=5m
    
    - name: Update Frontend Deployment
      run: |
        kubectl set image deployment/frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ steps.vars.outputs.sha_short }} -n leaderboard
        kubectl rollout status deployment/frontend -n leaderboard --timeout=5m
    
    - name: Verify Deployment
      run: |
        echo "=== Deployment Status ==="
        kubectl get pods -n leaderboard
        kubectl get svc -n leaderboard
        kubectl get ingress -n leaderboard
        echo ""
        echo "=== Application URLs ==="
        echo "Frontend: http://192.168.56.102:31109/"
        echo "Backend: http://192.168.56.102:31109/api/leaderboard"
